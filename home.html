<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIP Dashboard - Mega Lottery</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-database-compat.js"></script>
    
    <style>
        :root {
            --gold: #ffcf40;
            --gold-gradient: linear-gradient(45deg, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c);
            --dark-bg: #0a0a0c;
            --glass: rgba(255, 255, 255, 0.03);
            --neon-blue: #00f2fe;
            --neon-pink: #ff0055;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: var(--dark-bg);
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(191, 149, 63, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 242, 254, 0.05) 0%, transparent 50%);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* Money Animation Effect */
        .money-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: -1;
            opacity: 0.3;
        }

        /* Floating Animation */
        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
        }

        .coin {
            position: absolute;
            bottom: -50px;
            background: var(--gold-gradient);
            border-radius: 50%;
            width: 20px; height: 20px;
            animation: float 5s linear infinite;
        }

        /* Navbar */
        .nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 207, 64, 0.2);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .user-profile img {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: 2px solid #ffcf40;
            box-shadow: 0 0 15px rgba(255, 207, 64, 0.5);
            object-fit: cover;
        }

        .user-info h4 {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            font-size: 18px;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 900;
        }

        /* Main Container */
        .container {
            max-width: 1200px;
            margin: 30px auto;
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 30px;
            padding: 0 20px;
        }

        /* Premium Card Style */
        .card {
            background: var(--glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 35px;
            backdrop-filter: blur(15px);
            position: relative;
            overflow: hidden;
            transition: 0.4s ease;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .card:hover {
            border-color: rgba(255, 207, 64, 0.4);
            transform: translateY(-5px);
        }

        .card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,207,64,0.05) 0%, transparent 70%);
        }

        h3 {
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #ccc;
            margin-bottom: 25px;
            font-size: 14px;
        }

        /* Lottery Code Display */
        .code-box {
            font-family: 'Montserrat', sans-serif;
            font-size: 32px;
            font-weight: 900;
            background: rgba(0,0,0,0.3);
            padding: 25px;
            border-radius: 20px;
            color: var(--gold);
            border: 2px solid #333;
            letter-spacing: 5px;
            text-shadow: 0 0 20px rgba(255, 207, 64, 0.6);
            margin: 20px 0;
            position: relative;
        }

        /* Countdown Timer */
        .timer-container {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        .time-part {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 15px;
            min-width: 60px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .time-part span {
            display: block;
            font-size: 28px;
            font-weight: 900;
            color: var(--neon-pink);
            text-shadow: 0 0 10px var(--neon-pink);
        }

        .time-label {
            font-size: 10px;
            color: #888;
            text-transform: uppercase;
        }

        /* Winner Board VIP List */
        .winner-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px 25px;
            background: linear-gradient(90deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
            margin-bottom: 12px;
            border-radius: 18px;
            border: 1px solid rgba(255,255,255,0.05);
            transition: 0.3s;
            animation: slideIn 0.5s ease forwards;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        .winner-item:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: var(--gold);
        }

        .winner-rank {
            font-weight: 900;
            color: var(--gold);
            margin-right: 15px;
            font-size: 20px;
        }

        .winner-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-grow: 1;
        }

        .winner-info img {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 1px solid var(--gold);
        }

        .win-code {
            font-family: monospace;
            background: rgba(0, 242, 254, 0.1);
            color: var(--neon-blue);
            padding: 5px 12px;
            border-radius: 8px;
            font-weight: bold;
        }

        /* Logout Button */
        .logout-btn {
            background: transparent;
            border: 1px solid var(--neon-pink);
            color: var(--neon-pink);
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .logout-btn:hover {
            background: var(--neon-pink);
            color: white;
            box-shadow: 0 0 20px var(--neon-pink);
        }

        @media (max-width: 768px) {
            .container { grid-template-columns: 1fr; }
            .nav { padding: 15px 20px; }
        }
    </style>
</head>
<body>

<div class="money-bg" id="moneyBg"></div>

<div class="nav">
    <div class="user-profile">
        <img id="userImg" src="https://via.placeholder.com/100" alt="User">
        <div class="user-info">
            <h4 id="userName">VIP PLAYER</h4>
            <small style="color: #888;">Premium Member</small>
        </div>
    </div>
    <button class="logout-btn" onclick="logout()">LOGOUT</button>
</div>

<div class="container">
    <div class="left-col">
        <div class="card">
            <div style="position:absolute; top:10px; right:20px; color:var(--gold); font-size:24px;">💰</div>
            <h3>Your Lucky Ticket</h3>
            <div class="code-box" id="userLotteryCode">LOADING...</div>
            <p style="color: #888; font-size: 13px;">Registration Closes: <span id="regEnd" style="color:white;">--:--</span></p>
        </div>

        <div class="card" style="margin-top: 25px; text-align: center;">
            <h3>Big Result Draw In</h3>
            <div class="timer-container" id="timer">
                <div class="time-part"><span id="days">00</span><div class="time-label">Days</div></div>
                <div class="time-part"><span id="hours">00</span><div class="time-label">Hrs</div></div>
                <div class="time-part"><span id="mins">00</span><div class="time-label">Min</div></div>
                <div class="time-part"><span id="secs">00</span><div class="time-label">Sec</div></div>
            </div>
        </div>
    </div>

    <div class="right-col">
        <div class="card">
            <h3 style="display: flex; align-items: center; gap: 10px;">
                <span style="color: var(--gold);">🏆</span> Top 10 Winners Board
            </h3>
            <div id="winnerList">
                <!-- Winners -->
                <p style="text-align: center; color: #555; padding: 20px;">Waiting for draw results...</p>
            </div>
        </div>
    </div>
</div>

<script>
    // Config same as before
    const firebaseConfig = {
        apiKey: "AIzaSyBWf_n33QHKWkLOENxXp-v6YHMag84zmVA",
        authDomain: "lotari-dd0f5.firebaseapp.com",
        databaseURL: "https://lotari-dd0f5-default-rtdb.firebaseio.com",
        projectId: "lotari-dd0f5",
        storageBucket: "lotari-dd0f5.firebasestorage.app",
        messagingSenderId: "30483961988",
        appId: "1:30483961988:web:ef5498266d9ec4c9eecad1"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Money Animation Background
    function createCoins() {
        const bg = document.getElementById('moneyBg');
        for(let i=0; i<15; i++) {
            setTimeout(() => {
                const coin = document.createElement('div');
                coin.className = 'coin';
                coin.style.left = Math.random() * 100 + 'vw';
                coin.style.animationDuration = (Math.random() * 3 + 2) + 's';
                coin.style.width = coin.style.height = Math.random() * 15 + 10 + 'px';
                bg.appendChild(coin);
                setTimeout(() => coin.remove(), 5000);
            }, i * 300);
        }
    }
    setInterval(createCoins, 3000);

    firebase.auth().onAuthStateChanged(user => {
        if (user) {
            db.ref('users/' + user.uid).on('value', snap => {
                const data = snap.val();
                if(data) {
                    document.getElementById('userName').innerText = (data.firstName + " " + data.lastName).toUpperCase();
                    document.getElementById('userImg').src = data.profilePic;
                    document.getElementById('userLotteryCode').innerText = data.lotteryCode;
                }
            });
            startRealtimeListeners();
        } else {
            window.location.href = "login.html";
        }
    });

    function startRealtimeListeners() {
        db.ref('settings').on('value', snap => {
            const settings = snap.val();
            if(settings) {
                document.getElementById('regEnd').innerText = settings.regEnd;
                runCountdown(settings.resultDate);
            }
        });

        db.ref('winners').on('value', snap => {
            const list = document.getElementById('winnerList');
            list.innerHTML = "";
            if(snap.exists()){
                let index = 1;
                snap.forEach(child => {
                    const win = child.val();
                    db.ref('users/' + win.uid).once('value', uSnap => {
                        const u = uSnap.val();
                        list.innerHTML += `
                            <div class="winner-item">
                                <div class="winner-info">
                                    <span class="winner-rank">#${index++}</span>
                                    <img src="${u.profilePic}">
                                    <div>
                                        <div style="font-weight:600; font-size:14px;">${u.firstName}</div>
                                        <div style="font-size:10px; color:#aaa;">Verified Winner</div>
                                    </div>
                                </div>
                                <span class="win-code">${u.lotteryCode}</span>
                            </div>
                        `;
                    });
                });
            } else {
                list.innerHTML = `<p style="text-align: center; color: #555; padding: 20px;">Winners will be announced soon!</p>`;
            }
        });
    }

    function runCountdown(date) {
        function update() {
            const now = new Date().getTime();
            const diff = new Date(date).getTime() - now;
            if(diff <= 0) {
                document.getElementById('timer').innerHTML = "<h2 style='color:var(--gold)'>DRAWING NOW...</h2>";
                return;
            }
            document.getElementById('days').innerText = Math.floor(diff / (1000*60*60*24)).toString().padStart(2,'0');
            document.getElementById('hours').innerText = Math.floor((diff % (1000*60*60*24)) / (1000*60*60)).toString().padStart(2,'0');
            document.getElementById('mins').innerText = Math.floor((diff % (1000*60*60)) / (1000*60)).toString().padStart(2,'0');
            document.getElementById('secs').innerText = Math.floor((diff % (1000*60)) / 1000).toString().padStart(2,'0');
        }
        setInterval(update, 1000);
    }

    function logout() {
        firebase.auth().signOut().then(() => window.location.href = "login.html");
    }
</script>

</body>
</html>
                                                                                                                                 </html>
